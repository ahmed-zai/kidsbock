version: "3.9"

services:

  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - internal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
    security_opt:
      - no-new-privileges:true

  # -----------------------------
  # Express Backend
  # -----------------------------
  server:
    build:
      context: ./server
      target: production
    container_name: express_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDATABASE}
      NODE_ENV: production
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-network
    expose:
      - "5000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # Flask Service
  # -----------------------------
  flask:
    build:
      context: ./flask_app
    container_name: flask_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDATABASE}
      FLASK_PORT: 6000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-network
    expose:
      - "6000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # -----------------------------
  # React Client (static build)
  # -----------------------------
  client:
    build:
      context: ./client
    container_name: react_client
    restart: unless-stopped
    networks:
      - internal-network
    expose:
      - "80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # -----------------------------
  # Nginx Reverse Proxy
  # -----------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
      - flask
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"

# -----------------------------
# Volumes
# -----------------------------
volumes:
  postgres_data:
    driver: local

# -----------------------------
# Networks
# -----------------------------
networks:
  internal-network:
    driver: bridge
